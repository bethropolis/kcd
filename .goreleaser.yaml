version: 2

project_name: kcd

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: kcd
    main: ./cmd/kcd
    binary: kcd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    ids:
      - kcd
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - README.md
      - LICENSE
      - packaging/kcd.example.toml
      - packaging/kcd-user.service
      - packaging/kcd-system.service
      - packaging/ufw-kcd
      - packaging/firewalld-kcd.xml
      - packaging/nautilus-kcd.py
      - scripts/install.sh
      - scripts/uninstall.sh

nfpms:
  - id: packages
    package_name: kcd
    file_name_template: >-
      {{ .PackageName }}_
      {{- .Version }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}
    vendor: bethropolis
    homepage: https://github.com/bethropolis/kcd
    maintainer: bethropolis
    description: |
      kcd is a lightweight, headless implementation of the KDE Connect protocol (v8)
      written in Go. It allows Linux servers and minimal desktop environments to
      interact with the KDE Connect ecosystem without a GUI or heavy dependencies.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/kcd-user.service
        dst: /usr/lib/systemd/user/kcd@.service
        type: config|noreplace
      - src: packaging/kcd-system.service
        dst: /usr/lib/systemd/system/kcd.service
        type: config|noreplace
      - src: packaging/kcd.example.toml
        dst: /usr/share/doc/kcd/kcd.example.toml
      - src: packaging/ufw-kcd
        dst: /etc/ufw/applications.d/kcd
        type: config|noreplace
        packager: deb
      - src: packaging/firewalld-kcd.xml
        dst: /etc/firewalld/services/kcd.xml
        type: config|noreplace
        packager: rpm
      - src: packaging/nautilus-kcd.py
        dst: /usr/share/doc/kcd/nautilus-kcd.py
      - src: README.md
        dst: /usr/share/doc/kcd/README.md
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh
    deb:
      lintian_overrides:
        - statically-linked-binary
    rpm:
      summary: Headless KDE Connect daemon

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"
      - "typo"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: bethropolis
    name: kcd
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
  make_latest: true
  header: |
    ## kcd v{{ .Version }}

    Headless KDE Connect daemon for Linux.

    ### Installation

    **Quick install (Linux amd64):**
    ```bash
    curl -sSL https://github.com/bethropolis/kcd/releases/download/v{{ .Version }}/kcd_{{ .Version }}_x86_64.tar.gz | tar -xz
    sudo mv kcd /usr/local/bin/
    ```

    **Debian / Ubuntu:**
    ```bash
    curl -LO https://github.com/bethropolis/kcd/releases/download/v{{ .Version }}/kcd_{{ .Version }}_x86_64.deb
    sudo dpkg -i kcd_{{ .Version }}_x86_64.deb
    ```

    **Fedora / RHEL:**
    ```bash
    curl -LO https://github.com/bethropolis/kcd/releases/download/v{{ .Version }}/kcd_{{ .Version }}_x86_64.rpm
    sudo rpm -i kcd_{{ .Version }}_x86_64.rpm
    ```
  footer: |
    **Full Changelog:** https://github.com/bethropolis/kcd/compare/{{ .PreviousTag }}...v{{ .Version }}